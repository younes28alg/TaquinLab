<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TAQUIN LAB - En jeu</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        .stats { font-size: 1.2em; color: #5f6368; margin-bottom: 20px; display: flex; justify-content: space-around; }
        
        .grid {
            display: grid;
            grid-gap: 5px;
            margin: 20px auto;
            width: fit-content;
            background-color: #bbada0;
            padding: 10px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        
        .tile {
            width: 100px;
            height: 100px;
            background-color: #eee4da;
            color: #776e65;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            background-repeat: no-repeat;
            border: 1px solid #bbada0;
            box-sizing: border-box;
        }
        
        .tile.empty {
            background-color: #cdc1b4;
            cursor: default;
            background-image: none !important;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 25px;
            font-weight: bold;
        }
        
        .win-message {
            background-color: #e6f4ea;
            color: #1e8e3e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ceead6;
        }
        .score-val { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" title="Changer de mode">🌓</button>
    <div class="container">
        <h1 style="font-family: 'Luckiest Guy', cursive; color: #3b82f6; font-size: 3rem; text-shadow: 2px 2px 0px #000;">TAQUIN LAB</h1>
        <h2 style="font-family: 'Silkscreen', cursive; color: #facc15; margin-top: -10px;">NIVEAU <span th:text="${game.level}"></span></h2>
        
        <div class="stats" style="font-family: 'Silkscreen', cursive; color: #9ca3af; font-size: 0.9rem;">
            <div>Mouvements Niveau : <span class="score-val" th:text="${game.moves}">0</span></div>
            <div>Score Cumulé : <span class="score-val" th:text="${game.totalAccumulatedMoves}">0</span></div>
            <div style="font-weight: bold;">TOTAL : <span class="score-val" th:text="${game.totalScore}">0</span></div>
        </div>

        <div th:if="${game.completed and game.level == 4}" class="win-message">
            <h2>🏆 JEU TERMINÉ ! 🎉</h2>
            <p>Score Final : <strong th:text="${game.totalScore}"></strong> mouvements.</p>
            <a th:href="@{/}" class="btn">Retour au menu</a>
        </div>

        <div class="grid" id="game-grid" th:style="'grid-template-columns: repeat(' + ${game.size} + ', 100px);'">
            <div th:each="tile, iter : ${game.board}" 
                 class="tile" 
                 th:classappend="${tile == 0} ? 'empty' : ''"
                 th:attr="data-index=${iter.index}"
                 th:style="${tile != 0} ? 'background-image: url(' + @{/static/images/{name}(name=${game.imageName})} + '); background-size: ' + ${game.size * 100} + 'px ' + ${game.size * 100} + 'px; background-position: ' + ${-((tile-1) % game.size) * 100} + 'px ' + ${-((tile-1) / game.size) * 100} + 'px;' : ''"
                 onclick="makeMove(this.getAttribute('data-index'))">
                <span th:if="${tile != 0}" th:text="${tile}" style="background: rgba(255,255,255,0.6); padding: 5px; border-radius: 50%; font-size: 0.8em;"></span>
            </div>
        </div>

        <div class="actions">
            <a th:href="@{/save-game}" class="btn" style="background-color: #34a853;">Sauvegarder et Quitter</a>
            <a th:href="@{/}" class="btn" style="background-color: #70757a;">Quitter sans sauvegarder</a>
        </div>
    </div>

    <script th:inline="javascript">
        const gameSize = [[${game.size}]];
        const imageName = [[${game.imageName}]];
        const contextPath = /*[[@{/}]]*/ '/taquin/';

        async function makeMove(index) {
            const response = await fetch(`${contextPath}api/move/${index}`, {
                method: 'POST'
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data.moved) {
                    updateBoard(data.board);
                    document.querySelector('.stats div:nth-child(1) span').innerText = data.moves;
                    document.querySelector('.stats div:nth-child(3) span').innerText = data.totalScore;
                    
                    if (data.solved) {
                        if (data.nextLevelUrl) {
                            setTimeout(() => window.location.href = data.nextLevelUrl, 500);
                        } else if (data.finished) {
                            window.location.reload(); // Pour afficher le message de victoire
                        }
                    }
                }
            }
        }

        function updateBoard(board) {
            const grid = document.getElementById('game-grid');
            const tiles = grid.querySelectorAll('.tile');
            
            board.forEach((tileValue, i) => {
                const tile = tiles[i];
                tile.className = 'tile' + (tileValue === 0 ? ' empty' : '');
                
                if (tileValue !== 0) {
                    tile.style.backgroundImage = `url(${contextPath}static/images/${imageName})`;
                    tile.style.backgroundSize = `${gameSize * 100}px ${gameSize * 100}px`;
                    const posX = -((tileValue - 1) % gameSize) * 100;
                    const posY = -Math.floor((tileValue - 1) / gameSize) * 100;
                    tile.style.backgroundPosition = `${posX}px ${posY}px`;
                    tile.innerHTML = `<span style="background: rgba(255,255,255,0.6); padding: 5px; border-radius: 50%; font-size: 0.8em;">${tileValue}</span>`;
                } else {
                    tile.style.backgroundImage = 'none';
                    tile.innerHTML = '';
                }
            });
        }

        // Gestion du Thème
        const toggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        toggleBtn.addEventListener('click', () => {
            let theme = document.body.getAttribute('data-theme');
            if (theme === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
