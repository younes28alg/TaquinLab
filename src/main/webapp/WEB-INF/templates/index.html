<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TAQUIN LAB - Accueil</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --text-color: #333;
            --secondary-text: #666;
            --btn-bg: #1a73e8;
            --btn-hover: #1557b0;
            --table-border: #ddd;
            --table-header-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --secondary-text: #b0b0b0;
            --btn-bg: #bb86fc;
            --btn-hover: #9965f4;
            --table-border: #333;
            --table-header-bg: #2d2d2d;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); text-align: center; transition: background-color 0.3s, color 0.3s; }
        .container { background: var(--container-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: 50px auto; transition: background-color 0.3s; }
        .btn { display: inline-block; padding: 12px 24px; background-color: var(--btn-bg); color: white; text-decoration: none; border-radius: 8px; margin: 10px; font-weight: bold; transition: background 0.3s; border: none; cursor: pointer; }
        .btn:hover { background-color: var(--btn-hover); }
        .btn-secondary { background-color: #34a853; }
        .btn-secondary:hover { background-color: #2d8a46; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid var(--table-border); }
        th { background-color: var(--table-header-bg); }

        /* Toggle Button Style */
        .theme-toggle { position: fixed; top: 20px; right: 20px; padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; background: var(--container-bg); border: 1px solid var(--table-border); box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" title="Changer de mode">🌓</button>

    <div class="container">
        <h1>TAQUIN LAB</h1>
        
        <!-- Connexion -->
        <div th:if="${player == null}">
            <div th:if="${error}" style="color: #ef4444; margin-bottom: 15px; font-weight: bold; font-family: 'Silkscreen', cursive;" th:text="${error}"></div>
            
            <div id="auth-buttons" style="margin-bottom: 30px;">
                <button class="btn" onclick="toggleForm('login-form')" style="width: 280px; font-size: 1.1rem;">ACCÉDER AU LAB</button>
                <br>
                <button class="btn" onclick="toggleForm('register-form')" style="background-color: #4b5563; box-shadow: 0 4px 0px #1f2937; width: 280px; font-size: 1.1rem; margin-top: 15px;">NOUVEAU SCIENTIFIQUE</button>
            </div>

            <div id="login-form" style="display: none; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--card-border); margin-bottom: 30px; box-shadow: 0 8px 16px var(--shadow);">
                <h2 style="font-family: 'Luckiest Guy', cursive; color: var(--title-color); font-size: 2rem; margin-bottom: 20px; text-shadow: 1px 1px 0px #000;">ACCÈS AU LAB</h2>
                <form th:action="@{/login}" method="post">
                    <input type="text" name="username" placeholder="🎮 NOM D'UTILISATEUR" required style="padding: 12px; width: 250px; border-radius: 8px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-color); margin-bottom: 15px; text-align: center; font-family: 'Silkscreen', cursive; font-size: 0.8rem;">
                    <br>
                    <input type="password" name="password" placeholder="🔑 MOT DE PASSE" required style="padding: 12px; width: 250px; border-radius: 8px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-color); margin-bottom: 15px; text-align: center; font-family: 'Silkscreen', cursive; font-size: 0.8rem;">
                    <br>
                    <button type="submit" class="btn" style="width: 250px;">SE CONNECTER</button>
                    <br>
                    <a href="javascript:void(0)" onclick="toggleForm('auth-buttons')" style="color: var(--secondary-text); font-family: 'Silkscreen', cursive; font-size: 0.8rem; text-decoration: none; margin-top: 10px; display: inline-block;">RETOUR</a>
                </form>
            </div>
            
            <div id="register-form" style="display: none; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--card-border); box-shadow: 0 8px 16px var(--shadow);">
                <h2 style="font-family: 'Luckiest Guy', cursive; color: #a855f7; font-size: 2rem; margin-bottom: 20px; text-shadow: 1px 1px 0px #000;">NOUVEAU SCIENTIFIQUE ?</h2>
                <form th:action="@{/register}" method="post">
                    <input type="text" name="username" placeholder="🎮 CHOISIR UN NOM" required style="padding: 12px; width: 250px; border-radius: 8px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-color); margin-bottom: 15px; text-align: center; font-family: 'Silkscreen', cursive; font-size: 0.8rem;">
                    <br>
                    <input type="password" name="password" placeholder="🔑 CHOISIR UN PASS" required style="padding: 12px; width: 250px; border-radius: 8px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-color); margin-bottom: 15px; text-align: center; font-family: 'Silkscreen', cursive; font-size: 0.8rem;">
                    <br>
                    <button type="submit" class="btn" style="background-color: #4b5563; box-shadow: 0 4px 0px #1f2937; width: 250px;">CRÉER MON COMPTE</button>
                    <br>
                    <a href="javascript:void(0)" onclick="toggleForm('auth-buttons')" style="color: var(--secondary-text); font-family: 'Silkscreen', cursive; font-size: 0.8rem; text-decoration: none; margin-top: 10px; display: inline-block;">RETOUR</a>
                </form>
            </div>
        </div>

        <!-- Menu Principal -->
        <div th:if="${player != null}">
            <p style="font-family: 'Silkscreen', cursive; font-size: 1.1rem;">PRÊT À JOUER, <span style="color: var(--title-color);" th:text="${player.username}"></span> ?</p>
            
            <div style="margin: 40px 0;">
                <a th:href="@{/new-game}" class="btn" style="font-size: 1.2rem; padding: 18px 36px;">NOUVELLE EXPÉRIENCE</a>

                <!-- Parties sauvegardées -->
                <div th:if="${not #lists.isEmpty(savedGames)}" style="margin-top: 40px;">
                    <h3 style="font-family: 'Luckiest Guy', cursive; color: #facc15; font-size: 1.8rem; margin-bottom: 20px;">🧪 EXPÉRIENCES EN COURS</h3>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <div th:each="g : ${savedGames}" class="saved-game-card">
                            <div class="game-info">
                                <h3>NIVEAU <span th:text="${g.level}"></span></h3>
                                <p>⚡ <span th:text="${g.totalScore}"></span> MOUVEMENTS</p>
                            </div>
                            <a th:href="@{/game/{id}(id=${g.id})}" class="btn btn-secondary">REPRENDRE</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <a th:href="@{/logout}" style="color: #ef4444; font-size: 0.9em; text-decoration: none; font-family: 'Silkscreen', cursive; border-bottom: 1px dashed #ef4444;">QUITTER LE LAB</a>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 2px solid var(--card-border);">

        <!-- Tableau des scores -->
        <div class="score-table-container">
            <h2>🏆 TOP SCIENTIFIQUES</h2>
            <table>
                <thead>
                    <tr>
                        <th>RANG</th>
                        <th>JOUEUR</th>
                        <th>SCORE TOTAL</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p, iter : ${topScorers}" th:if="${p.highScore > 0}" th:class="'rank-' + ${iter.count}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${p.username}">JOUEUR</td>
                        <td><span th:text="${p.highScore}">0</span> ⚡</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(topScorers) || topScorers[0].highScore == 0}">
                        <td colspan="3" style="color: var(--secondary-text); padding: 30px; font-family: 'Silkscreen', cursive;">LE LAB EST VIDE... SOIS LE PREMIER !</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Préchargement des images de puzzle pour éviter les délais pendant le jeu
        const puzzles = ['puzzle1.jpg', 'puzzle2.jpg', 'puzzle3.jpg', 'puzzle4.jpg'];
        puzzles.forEach(image => {
            const img = new Image();
            img.src = '/taquin/static/images/' + image;
        });

        const toggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        if (currentTheme === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        toggleBtn.addEventListener('click', () => {
            let theme = document.body.getAttribute('data-theme');
            if (theme === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        function toggleForm(formId) {
            const forms = ['login-form', 'register-form', 'auth-buttons'];
            forms.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = (id === formId) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
